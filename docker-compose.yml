services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-tradevalidator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB migrations (runs once at startup) ────────────────────────────────────
  migrate:
    build: .
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        sleep 3 &&
        alembic upgrade head &&
        echo 'Migrations complete.'
      "
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-tradevalidator}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI application ─────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-tradevalidator}
      REDIS_URL:    redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A workers.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-tradevalidator}
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery beat (scheduled tasks) ──────────────────────────────────────────
  beat:
    build: .
    command: celery -A workers.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_pass}@db:5432/${POSTGRES_DB:-tradevalidator}
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      - redis
      - worker

  # ── Nginx reverse proxy (HTTPS termination) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # mount your certs here
      - certbot_www:/var/www/certbot:ro  # for Let's Encrypt HTTP-01 challenge
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  certbot_www:
