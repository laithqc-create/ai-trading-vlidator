<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI Trade Validator — Sign in</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--bg2:#111318;--bg3:#181c24;
  --border:rgba(255,255,255,.08);
  --text:#e8eaf0;--text2:#9da3b4;--text3:#5a6070;
  --accent:#58a6ff;--accent2:#1a4fa0;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
  --r:12px;--r-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  width:100%;max-width:420px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#1a4fa0,#58a6ff);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-name{font-size:17px;font-weight:700}
.logo-name span{color:var(--accent)}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.tabs{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:8px;border-radius:6px;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--text2);transition:all .2s}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:500;color:var(--text2)}
input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.btn{padding:11px;border-radius:var(--r-sm);font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;width:100%}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#79b8ff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-google{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--text2)}
.btn-telegram{background:#229ED9;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:10px}
.btn-telegram:hover{background:#1a8abf}
.divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:var(--r-sm);
  padding:10px 12px;font-size:12px;color:var(--red);display:none}
.success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:var(--r-sm);
  padding:10px 12px;font-size:12px;color:var(--green);display:none}
.footer{margin-top:20px;font-size:11px;color:var(--text3);text-align:center;line-height:1.6}
.footer a{color:var(--accent);text-decoration:none}
/* Billing section */
.billing-section{display:none;border-top:1px solid var(--border);padding-top:20px;margin-top:6px}
.billing-section h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.05em}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-name">AI Trade <span>Validator</span></div>
  </div>

  <h1 id="page-title">Welcome back</h1>
  <p class="sub" id="page-sub">Sign in to your account to continue</p>

  <!-- Sign in / Sign up tabs -->
  <div class="tabs" id="auth-tabs">
    <div class="tab active" onclick="switchTab('login')">Sign in</div>
    <div class="tab" onclick="switchTab('register')">Create account</div>
  </div>

  <div class="error" id="error-box"></div>
  <div class="success" id="success-box"></div>

  <!-- ── Login form ── -->
  <div id="login-form" class="form">
    <div class="field">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign in</button>

    <div class="divider">or continue with</div>

    <button class="btn btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z" fill="#4285F4"/><path d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04c-.72.48-1.63.76-2.7.76-2.08 0-3.84-1.4-4.47-3.28H1.88v2.09A7.99 7.99 0 008.98 17z" fill="#34A853"/><path d="M4.51 10.5A4.8 4.8 0 014.26 9c0-.52.09-1.02.25-1.5V5.41H1.88A7.99 7.99 0 001 9c0 1.29.31 2.51.88 3.59l2.63-2.09z" fill="#FBBC05"/><path d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3C12.95 1.19 11.15.5 8.98.5A7.99 7.99 0 001.88 5.4L4.5 7.5c.63-1.89 2.4-3.92 4.48-3.92z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <button class="btn btn-telegram" onclick="doTelegramLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.088 13.42l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.834.953l.266-.814z"/></svg>
      Continue with Telegram
    </button>
  </div>

  <!-- ── Register form ── -->
  <div id="register-form" class="form" style="display:none">
    <div class="field">
      <label>Full name</label>
      <input type="text" id="reg-name" placeholder="John Smith" autocomplete="name">
    </div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password <span style="color:var(--text3)">(min 8 characters)</span></label>
      <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <!-- Billing section -->
    <div style="margin-top:4px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2)">
        <input type="checkbox" id="show-billing" onchange="toggleBilling(this.checked)" style="width:auto">
        Add billing details for invoices &amp; tax purposes
      </label>
    </div>

    <div class="billing-section" id="billing-section">
      <h3>Billing details</h3>
      <div class="field">
        <label>Full billing name</label>
        <input type="text" id="b-name" placeholder="John Smith">
      </div>
      <div class="field">
        <label>Company <span style="color:var(--text3)">(optional)</span></label>
        <input type="text" id="b-company" placeholder="Acme Trading Ltd">
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text" id="b-address" placeholder="123 Main Street">
      </div>
      <div class="grid-2">
        <div class="field">
          <label>City</label>
          <input type="text" id="b-city" placeholder="London">
        </div>
        <div class="field">
          <label>State / Region</label>
          <input type="text" id="b-state" placeholder="England">
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>ZIP / Postal code</label>
          <input type="text" id="b-zip" placeholder="EC1A 1BB">
        </div>
        <div class="field">
          <label>Country <span style="color:var(--text3)">(ISO-2)</span></label>
          <input type="text" id="b-country" placeholder="GB" maxlength="2" style="text-transform:uppercase">
        </div>
      </div>
      <div class="field" style="margin-top:4px">
        <label>VAT / Tax ID <span style="color:var(--text3)">(optional)</span></label>
        <input type="text" id="b-tax" placeholder="GB123456789">
      </div>
    </div>

    <button class="btn btn-primary" onclick="doRegister()">Create account</button>

    <div class="divider">or continue with</div>

    <button class="btn btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z" fill="#4285F4"/><path d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04c-.72.48-1.63.76-2.7.76-2.08 0-3.84-1.4-4.47-3.28H1.88v2.09A7.99 7.99 0 008.98 17z" fill="#34A853"/><path d="M4.51 10.5A4.8 4.8 0 014.26 9c0-.52.09-1.02.25-1.5V5.41H1.88A7.99 7.99 0 001 9c0 1.29.31 2.51.88 3.59l2.63-2.09z" fill="#FBBC05"/><path d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3C12.95 1.19 11.15.5 8.98.5A7.99 7.99 0 001.88 5.4L4.5 7.5c.63-1.89 2.4-3.92 4.48-3.92z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="footer">
    By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </div>
</div>

<script>
const API = window.API_BASE || "";

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", (tab==="login"?0:1)===i));
  document.getElementById("login-form").style.display    = tab === "login"    ? "flex" : "none";
  document.getElementById("register-form").style.display = tab === "register" ? "flex" : "none";
  document.getElementById("page-title").textContent = tab === "login" ? "Welcome back" : "Create your account";
  document.getElementById("page-sub").textContent   = tab === "login"
    ? "Sign in to your account to continue"
    : "Start your free 14-day trial — no credit card needed";
  clearMessages();
}

function toggleBilling(show) {
  document.getElementById("billing-section").style.display = show ? "block" : "none";
}

function showError(msg) {
  const el = document.getElementById("error-box");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("success-box").style.display = "none";
}
function showSuccess(msg) {
  const el = document.getElementById("success-box");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("error-box").style.display = "none";
}
function clearMessages() {
  document.getElementById("error-box").style.display = "none";
  document.getElementById("success-box").style.display = "none";
}

function saveAndRedirect(data) {
  // Store JWT and user tokens in localStorage
  localStorage.setItem("atv_jwt",   data.access_token);
  localStorage.setItem("atv_token", data.user.tokens.api);
  localStorage.setItem("atv_user",  JSON.stringify(data.user));
  // Redirect to Mini App
  window.location.href = "/app";
}

async function doLogin() {
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  if (!email || !password) { showError("Please enter your email and password."); return; }
  clearMessages();
  const btn = document.querySelector("#login-form .btn-primary");
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    const res  = await fetch(API + "/auth/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Invalid email or password."); return; }
    saveAndRedirect(data);
  } catch { showError("Network error. Please try again."); }
  finally { btn.disabled = false; btn.textContent = "Sign in"; }
}

async function doRegister() {
  const full_name = document.getElementById("reg-name").value.trim();
  const email     = document.getElementById("reg-email").value.trim();
  const password  = document.getElementById("reg-password").value;
  if (!email || !password) { showError("Please enter your email and password."); return; }
  if (password.length < 8) { showError("Password must be at least 8 characters."); return; }
  clearMessages();
  const btn = document.querySelector("#register-form .btn-primary");
  btn.disabled = true; btn.textContent = "Creating account…";

  // Collect billing if shown
  const billing = document.getElementById("show-billing").checked ? {
    billing_name:    document.getElementById("b-name").value.trim(),
    billing_company: document.getElementById("b-company").value.trim(),
    billing_address: document.getElementById("b-address").value.trim(),
    billing_city:    document.getElementById("b-city").value.trim(),
    billing_state:   document.getElementById("b-state").value.trim(),
    billing_zip:     document.getElementById("b-zip").value.trim(),
    billing_country: document.getElementById("b-country").value.trim().toUpperCase(),
    tax_id:          document.getElementById("b-tax").value.trim(),
  } : {};

  try {
    const res  = await fetch(API + "/auth/register", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password, full_name, ...billing }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Registration failed. Please try again."); return; }

    // Save billing separately if provided
    if (Object.keys(billing).length && billing.billing_name) {
      await fetch(API + "/auth/billing", {
        method: "PATCH", headers: {"Content-Type":"application/json","Authorization":"Bearer "+data.access_token},
        body: JSON.stringify(billing),
      }).catch(() => {});
    }

    showSuccess("Account created! Redirecting…");
    setTimeout(() => saveAndRedirect(data), 800);
  } catch { showError("Network error. Please try again."); }
  finally { btn.disabled = false; btn.textContent = "Create account"; }
}

function doGoogle() {
  window.location.href = API + "/auth/google";
}

function doTelegramLogin() {
  // Open Telegram bot for auth — user sends /start to get their token
  const botUsername = window.TELEGRAM_BOT_USERNAME || "AITradeValidatorBot";
  window.open(`https://t.me/${botUsername}?start=auth`, "_blank");
  showSuccess("Send /start to the bot in Telegram, then copy your token to Settings.");
}

// Handle Google OAuth callback token in hash
(function() {
  const m = window.location.hash.match(/auth-token=([^&]+)/);
  if (m) {
    const token = decodeURIComponent(m[1]);
    // Fetch user profile with the JWT
    fetch(API + "/auth/me", {headers:{"Authorization":"Bearer "+token}})
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          localStorage.setItem("atv_jwt",   token);
          localStorage.setItem("atv_token", data.user.tokens.api);
          localStorage.setItem("atv_user",  JSON.stringify(data.user));
          window.location.href = "/app";
        }
      }).catch(() => {});
  }

  // Check if already logged in
  const jwt = localStorage.getItem("atv_jwt");
  if (jwt) {
    // Silently verify and redirect
    fetch(API + "/auth/me", {headers:{"Authorization":"Bearer "+jwt}})
      .then(r => r.ok ? window.location.href = "/app" : null)
      .catch(() => {});
  }
})();
</script>
</body>
</html>
